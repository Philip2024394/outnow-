  <body>
    <div id="root"></div>
    <script>
      // Immediately detect desktop website mode — before React renders
      (function(){
        var w = window.innerWidth, p = window.location.pathname;
        if (w >= 768 && ['/', '/property', '/rentals', '/places', '/agents'].indexOf(p) !== -1) {
          document.documentElement.classList.add('desktop-website');
          var r = document.getElementById('root'); if (r) r.classList.add('desktop-website');
        }
      })();
    </script>
